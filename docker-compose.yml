services:
  postgres:
    image: postgres:16-alpine
    container_name: runebrawl-postgres
    environment:
      POSTGRES_USER: runebrawl
      POSTGRES_PASSWORD: runebrawl
      POSTGRES_DB: runebrawl
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
