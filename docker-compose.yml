services:
  postgres:
    image: postgres:16-alpine
    container_name: runebrawl-postgres
    environment:
      POSTGRES_USER: runebrawl
      POSTGRES_PASSWORD: runebrawl
      POSTGRES_DB: runebrawl
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runebrawl -d runebrawl"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: runebrawl-server
    command: npm run dev -w @runebrawl/server
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgres://runebrawl:runebrawl@postgres:5432/runebrawl
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      PLAYER_SESSION_SECRET: replace-with-a-long-random-secret
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - server_node_modules:/app/node_modules

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: runebrawl-client
    command: npm run dev -w @runebrawl/client -- --host 0.0.0.0 --port 5173
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - client_node_modules:/app/node_modules

volumes:
  pg_data:
  server_node_modules:
  client_node_modules:
