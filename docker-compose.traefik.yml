services:
  postgres:
    image: postgres:16-alpine
    container_name: runebrawl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runebrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-runebrawl}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runebrawl} -d ${POSTGRES_DB:-runebrawl}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: runebrawl-server
    restart: unless-stopped
    command: >
      sh -lc "ENCODED_PG_PASSWORD=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_PASSWORD || \"\"))') &&
      export DATABASE_URL=postgres://$${POSTGRES_USER}:$${ENCODED_PG_PASSWORD}@postgres:5432/$${POSTGRES_DB} &&
      npm run build -w @runebrawl/shared &&
      npm run build -w @runebrawl/server &&
      npm run start -w @runebrawl/server"
    environment:
      PORT: 3001
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:-runebrawl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-runebrawl}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD?set in .env}
      PLAYER_SESSION_SECRET: ${PLAYER_SESSION_SECRET?set in .env}
      CORS_ALLOWED_ORIGINS: https://${APP_URL?set in .env}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.runebrawl-api.entrypoints=web"
      - "traefik.http.routers.runebrawl-api.rule=Host(`${APP_URL?set in .env}`) && (PathPrefix(`/auth`) || PathPrefix(`/admin`) || PathPrefix(`/lobbies`) || PathPrefix(`/matches`) || PathPrefix(`/ws`) || Path(`/health`))"
      - "traefik.http.routers.runebrawl-api.middlewares=runebrawl-redirect-https@docker"
      - "traefik.http.routers.runebrawl-api-secure.entrypoints=websecure"
      - "traefik.http.routers.runebrawl-api-secure.rule=Host(`${APP_URL?set in .env}`) && (PathPrefix(`/auth`) || PathPrefix(`/admin`) || PathPrefix(`/lobbies`) || PathPrefix(`/matches`) || PathPrefix(`/ws`) || Path(`/health`))"
      - "traefik.http.routers.runebrawl-api-secure.tls=true"
      - "traefik.http.routers.runebrawl-api-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-http_resolver}"
      - "traefik.http.routers.runebrawl-api-secure.middlewares=runebrawl-api-ratelimit@docker"
      - "traefik.http.routers.runebrawl-api-secure.priority=100"
      - "traefik.http.middlewares.runebrawl-api-ratelimit.ratelimit.average=80"
      - "traefik.http.middlewares.runebrawl-api-ratelimit.ratelimit.burst=160"
      - "traefik.http.middlewares.runebrawl-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.runebrawl-redirect-https.redirectscheme.permanent=true"
      - "traefik.http.services.runebrawl-api.loadbalancer.server.port=3001"
    security_opt:
      - no-new-privileges:true

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: runebrawl-client
    restart: unless-stopped
    command: >
      sh -lc "export VITE_API_BASE_URL=https://${APP_URL?set in .env} &&
      export VITE_WS_URL=wss://${APP_URL?set in .env}/ws &&
      export VITE_ALLOWED_HOSTS=${APP_URL?set in .env} &&
      npm run build -w @runebrawl/shared &&
      npm run build -w @runebrawl/client &&
      npm exec -w @runebrawl/client -- vite preview --host 0.0.0.0 --port 4173"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.runebrawl-game.entrypoints=web"
      - "traefik.http.routers.runebrawl-game.rule=Host(`${APP_URL?set in .env}`)"
      - "traefik.http.routers.runebrawl-game.middlewares=runebrawl-redirect-https@docker"
      - "traefik.http.routers.runebrawl-game-secure.entrypoints=websecure"
      - "traefik.http.routers.runebrawl-game-secure.rule=Host(`${APP_URL?set in .env}`)"
      - "traefik.http.routers.runebrawl-game-secure.tls=true"
      - "traefik.http.routers.runebrawl-game-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-http_resolver}"
      - "traefik.http.routers.runebrawl-game-secure.priority=10"
      - "traefik.http.services.runebrawl-game.loadbalancer.server.port=4173"
    security_opt:
      - no-new-privileges:true

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    external: true

volumes:
  pg_data:
